<!-- MODAL: AVALIAÇÃO -->
<div id="modal-avaliacao" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;align-items:flex-end;justify-content:center">
  <div style="background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:24px 20px 36px;text-align:center">
    <div style="font-size:2rem;margin-bottom:6px">🎉</div>
    <div style="font-size:1rem;font-weight:900;color:#1a1a1a;margin-bottom:4px" id="aval-loja-nome">Pedido entregue!</div>
    <div style="font-size:.82rem;color:#888;margin-bottom:20px">Como foi sua experiência?</div>
    <!-- Estrelas -->
    <div style="display:flex;justify-content:center;gap:8px;margin-bottom:16px" id="aval-estrelas">
      <span onclick="selecionarEstrela(1)" id="estrela-1" style="font-size:2.4rem;cursor:pointer;transition:transform .15s;filter:grayscale(1);opacity:.4">⭐</span>
      <span onclick="selecionarEstrela(2)" id="estrela-2" style="font-size:2.4rem;cursor:pointer;transition:transform .15s;filter:grayscale(1);opacity:.4">⭐</span>
      <span onclick="selecionarEstrela(3)" id="estrela-3" style="font-size:2.4rem;cursor:pointer;transition:transform .15s;filter:grayscale(1);opacity:.4">⭐</span>
      <span onclick="selecionarEstrela(4)" id="estrela-4" style="font-size:2.4rem;cursor:pointer;transition:transform .15s;filter:grayscale(1);opacity:.4">⭐</span>
      <span onclick="selecionarEstrela(5)" id="estrela-5" style="font-size:2.4rem;cursor:pointer;transition:transform .15s;filter:grayscale(1);opacity:.4">⭐</span>
    </div>
    <div id="aval-label" style="font-size:.82rem;font-weight:700;color:#e65e32;margin-bottom:14px;min-height:20px"></div>
    <textarea id="aval-comentario" placeholder="Comentário opcional..." rows="2"
      style="width:100%;border:1px solid #e0dbd5;border-radius:10px;padding:10px 12px;font-family:'Poppins',sans-serif;font-size:.82rem;resize:none;outline:none;margin-bottom:14px;box-sizing:border-box"></textarea>
    <div style="display:flex;gap:8px">
      <button onclick="fecharModalAvaliacao()"
        style="flex:1;padding:12px;border:1.5px solid #e0dbd5;border-radius:12px;background:#fff;font-family:'Poppins',sans-serif;font-weight:700;font-size:.82rem;color:#888;cursor:pointer">
        Pular
      </button>
      <button onclick="enviarAvaliacao()"
        style="flex:2;padding:12px;border:none;border-radius:12px;background:#E8001C;color:#fff;font-family:'Poppins',sans-serif;font-weight:800;font-size:.88rem;cursor:pointer">
        ⭐ Enviar avaliação
      </button>
    </div>
  </div>
</div>

<!DOCTYPE html>
<html lang="pt-BR">

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  color-scheme: only light;
  --red:#E8001C;--red-d:#C0001A;--dark:#111111;--mid:#444444;--gray:#888888;
  --light:#FFFFFF;--cream:#FFF5F5;--card:#FFFFFF;--border:rgba(232,0,28,.1);
  --accent:#FFF0F0;--accent2:#EBEBEB;
  --font:'Poppins',sans-serif;
  --st-red-unused:#C0001A;--st-red2:#A00015;
}
html,body{background:#FFFFFF;}
html,body{height:100%;overflow:hidden;background:#FFFFFF;font-family:var(--font);touch-action:manipulation;color-scheme:only light;}
/* Bloqueia modo noturno do Samsung e Android — força cores originais */
* { forced-color-adjust: none; -webkit-forced-color-adjust: none; }
@media (prefers-color-scheme: dark) {
  html, body, * { color-scheme: only light !important; }
}
*{box-sizing:border-box;}
#app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative;overflow:hidden;background:#FFFFFF;}
.screen{display:none;flex:1;flex-direction:column;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;background:#FFFFFF;}
.screen.active{display:flex;}

/* ── NAV ── */
.bottom-nav{flex-shrink:0;display:flex;background:#fff;border-top:1.5px solid var(--accent2);padding-bottom:env(safe-area-inset-bottom);z-index:50;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 8px;cursor:pointer;border:none;background:none;font-family:var(--font);font-size:10px;font-weight:600;color:var(--gray);position:relative;transition:color .15s;}
.nav-item.active{color:var(--red);}
.nav-item svg{width:22px;height:22px;}
.nav-badge{position:absolute;top:6px;right:calc(50% - 18px);min-width:16px;height:16px;background:var(--red);color:#fff;font-size:9px;font-weight:800;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;}

/* ── HEADER ── */
.top-header{flex-shrink:0;background:#fff;border-bottom:1.5px solid var(--accent2);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;}
.logo-text{font-size:1.3rem;font-weight:900;letter-spacing:-.03em;color:var(--dark);}
.logo-text .way{color:var(--red);}
.avatar-btn{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--red),var(--red-d));color:#fff;font-size:13px;font-weight:800;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cart-btn{width:36px;height:36px;border-radius:10px;background:var(--cream);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;}

/* ── HERO BANNER ── */
.hero-banner{background:linear-gradient(135deg,#111111 0%,#222222 60%,#111111 100%);border-radius:18px;overflow:hidden;position:relative;min-height:150px;padding:22px 22px 18px;}
.hero-banner::after{content:'🍽️';position:absolute;right:-12px;bottom:-18px;font-size:84px;opacity:.08;pointer-events:none;}

/* ── CATEGORIES ── */
.cat-pill{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:50px;border:1.5px solid var(--accent2);background:#fff;font-family:var(--font);font-size:12px;font-weight:600;color:var(--mid);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0;}
.cat-pill.active{background:var(--red);border-color:var(--red);color:#fff;}
.scroll-x{overflow-x:auto;scrollbar-width:none;display:flex;gap:8px;padding:14px 18px 6px;}
.scroll-x::-webkit-scrollbar{display:none;}

/* ── STORE CARD ── */
.store-card{background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 2px 14px rgba(232,0,28,.08);border:1px solid var(--accent2);cursor:pointer;transition:transform .15s,box-shadow .15s;}
.store-card:active{transform:scale(.99);}
.store-hero{height:120px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.store-hero-logo{width:72px;height:72px;border-radius:18px;object-fit:cover;border:3px solid rgba(255,255,255,.3);box-shadow:0 4px 16px rgba(0,0,0,.35);display:block;}
.store-hero-emoji{width:72px;height:72px;border-radius:18px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:34px;border:3px solid rgba(255,255,255,.2);}
.store-info{padding:12px 14px 14px;}
.store-name{font-size:14px;font-weight:800;color:var(--dark);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
/* Card B — horizontal: logo grande + info lado a lado */
.store-card-b{background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 2px 14px rgba(232,0,28,.08);border:1px solid var(--accent2);cursor:pointer;transition:transform .15s,box-shadow .15s;display:flex;align-items:stretch;}
.store-card-b:active{transform:scale(.98);}
.store-card-b-img{width:110px;flex-shrink:0;position:relative;overflow:hidden;}
.store-card-b-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.store-card-b-img .store-card-b-emoji{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:44px;}
.store-card-b-body{flex:1;padding:14px 14px 12px;display:flex;flex-direction:column;justify-content:space-between;min-width:0;}
.store-card-b-nome{font-size:15px;font-weight:800;color:var(--dark);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.store-card-b-meta{display:flex;gap:5px;flex-wrap:wrap;}
.store-card-b-tag{display:inline-flex;align-items:center;gap:3px;font-size:10px;color:var(--gray);font-weight:500;background:var(--cream);padding:3px 7px;border-radius:6px;}
.store-emoji{font-size:48px;display:flex;align-items:center;justify-content:center;width:100%;height:100%;}

.store-name{font-size:14px;font-weight:800;color:var(--dark);margin-bottom:5px;}
.store-meta{display:flex;gap:8px;flex-wrap:wrap;}
.store-tag{display:inline-flex;align-items:center;gap:3px;font-size:11px;color:var(--gray);font-weight:500;background:var(--cream);padding:3px 8px;border-radius:6px;}
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block;}

/* ── SEARCH INPUT ── */
.search-box{display:flex;align-items:center;gap:10px;background:#FFF5F5;border:1.5px solid var(--accent2);border-radius:14px;padding:11px 14px;}
.search-box input{border:none;background:transparent;font-family:var(--font);font-size:13px;color:var(--dark);outline:none;width:100%;}
.search-box input::placeholder{color:var(--gray);}

/* ── BACK HEADER ── */
.back-header{flex-shrink:0;background:#fff;border-bottom:1.5px solid var(--accent2);padding:12px 18px;display:flex;align-items:center;gap:12px;}
.back-btn{width:36px;height:36px;border-radius:10px;background:var(--cream);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* ══════════════════════════════════════
   STORE SCREEN — Cardápio
══════════════════════════════════════ */
/* Capa do estabelecimento */
.store-capa{flex-shrink:0;/* background definido via cor_primaria do estabelecimento */}
.loja-capa-header{display:flex;align-items:center;gap:14px;padding:18px 16px 10px;}
.loja-capa-logo{width:68px;height:68px;border-radius:16px;flex-shrink:0;background:rgba(255,255,255,.15);border:2.5px solid rgba(255,255,255,.35);display:flex;align-items:center;justify-content:center;font-size:32px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.2);}
.loja-capa-logo img{width:100%;height:100%;object-fit:cover;display:block;}
.loja-capa-nome{font-size:17px;font-weight:900;color:#fff;line-height:1.2;margin-bottom:2px;}
.loja-capa-desc{font-size:11px;color:rgba(255,255,255,.7);line-height:1.4;}
.loja-capa-meta{display:flex;gap:6px;padding:6px 16px 14px;flex-wrap:wrap;}
.loja-capa-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(0,0,0,.22);backdrop-filter:blur(4px);border-radius:7px;padding:4px 9px;font-size:10px;font-weight:600;color:#fff;}
.badge-capa{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.15);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:4px 10px;font-size:11px;color:#fff;font-weight:600;}

/* Tabs */
.store-tabs{flex-shrink:0;display:flex;background:#fff;border-bottom:1.5px solid var(--accent2);}
.store-tab{flex:1;padding:12px 4px;display:flex;align-items:center;justify-content:center;gap:4px;font-size:11px;font-weight:700;color:var(--gray);cursor:pointer;border:none;background:none;font-family:var(--font);border-bottom:2.5px solid transparent;transition:all .15s;}
.store-tab.active{color:#E8001C;border-bottom-color:#E8001C;}
/* Foguinho pulsante */
@keyframes fire-pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.55;transform:scale(.88)}}
@keyframes fire-off{0%,100%{opacity:.25;filter:grayscale(1)}}
.fire-on{animation:fire-pulse 1.8s ease-in-out infinite;display:inline-block;}
.fire-off{opacity:.25;filter:grayscale(1);display:inline-block;}
.tab-dot{display:none;width:6px;height:6px;border-radius:50%;background:#E8001C;margin-left:4px;flex-shrink:0;}
.tab-dot.show{display:inline-block;}

/* Fresquinho */
.fresquinho-wrap{flex-shrink:0;padding:12px 0 12px 14px;border-bottom:1px solid var(--border);background:var(--card);}
.story-thumb{width:64px;height:64px;border-radius:16px;overflow:hidden;position:relative;flex-shrink:0;cursor:pointer;border:2.5px solid #E8001C;}
.story-thumb img,.story-thumb video{width:100%;height:100%;object-fit:cover;}
.story-timer{position:absolute;bottom:2px;left:0;right:0;text-align:center;font-size:8px;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.6);}
.story-viewer{display:none;position:fixed;inset:0;background:#000;z-index:9999;flex-direction:column;}
.story-viewer.open{display:flex;}
.story-bars{display:flex;gap:4px;padding:12px 14px 0;}
.story-bar-bg{flex:1;height:3px;background:rgba(255,255,255,.35);border-radius:2px;overflow:hidden;}
.story-bar-fill{height:100%;background:#fff;width:0%;border-radius:2px;}

/* Filtros categorias */
.filtro-pill{display:inline-flex;align-items:center;padding:7px 16px;border-radius:50px;border:1.5px solid var(--accent2);background:#fff;font-family:var(--font);font-size:12px;font-weight:600;color:var(--mid);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0;}
.filtro-pill.ativo{background:#E8001C;border-color:#E8001C;color:#fff;}

/* Produto card */
.produto-card{background:#fff;border-radius:14px;overflow:hidden;display:flex;align-items:stretch;box-shadow:0 1px 10px rgba(232,0,28,.07);border:1px solid var(--accent2);cursor:pointer;transition:transform .12s;max-height:130px;}
.produto-card:active{transform:scale(.99);}
.produto-img-wrap{width:110px;min-width:110px;max-width:110px;max-height:130px;overflow:hidden;background:var(--cream);flex-shrink:0;align-self:stretch;}
.produto-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;opacity:0;transition:opacity .3s;}
.produto-img-wrap img.loaded{opacity:1;}
.produto-emoji-bg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:36px;}

.produto-body{flex:1;padding:12px;display:flex;flex-direction:column;justify-content:space-between;min-width:0;}
.produto-cat{font-size:10px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.03em;margin-bottom:2px;}
.produto-nome{font-size:13px;font-weight:800;color:var(--dark);line-height:1.3;margin-bottom:3px;}
.produto-desc{font-size:11px;color:var(--gray);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.produto-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px;}
.produto-preco{font-size:15px;font-weight:800;color:#E8001C;}
.produto-preco-orig{font-size:11px;color:var(--gray);text-decoration:line-through;}
.btn-mais{width:32px;height:32px;border-radius:10px;background:#E8001C;color:#fff;border:none;font-size:1.3rem;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.btn-ver{padding:6px 12px;border-radius:8px;background:var(--cream);border:none;font-family:var(--font);font-size:11px;font-weight:700;color:#E8001C;cursor:pointer;}

/* Modal produto */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:800;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-sheet{background:#fff;border-radius:22px 22px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease;display:flex;flex-direction:column;}
.modal-body{flex:1;overflow-y:auto;padding:18px 18px 0;}
.modal-footer{padding:12px 18px 20px;background:#fff;border-top:1px solid var(--accent2,#EBEBEB);}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;background:rgba(17,17,17,.15);border-radius:2px;margin:12px auto 0;}
.modal-img{width:100%;display:block;max-height:260px;object-fit:cover;}
.modal-emoji{display:flex;align-items:center;justify-content:center;font-size:80px;padding:32px;background:var(--cream);}
.modal-body{padding:12px 18px 8px;}
.modal-cat{font-size:10px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.03em;margin-bottom:4px;}
.modal-nome{font-size:18px;font-weight:900;color:var(--dark);margin-bottom:6px;}
.modal-desc{font-size:13px;color:var(--gray);line-height:1.6;margin-bottom:14px;}
.modal-preco{font-size:20px;font-weight:900;color:#E8001C;margin-bottom:16px;}
.qty-row{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
.qty-btn{width:36px;height:36px;border-radius:10px;background:var(--cream);border:none;font-size:1.3rem;font-weight:800;cursor:pointer;color:var(--dark);}
.qty-num{font-size:18px;font-weight:800;color:var(--dark);min-width:24px;text-align:center;}
.adicional-grupo{margin-bottom:14px;}
.adicional-titulo{font-size:12px;font-weight:800;color:var(--dark);margin-bottom:6px;}
.adicional-sub{font-size:10px;color:var(--gray);margin-bottom:8px;}
.adicional-opcao{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border:1.5px solid #e0dbd5;border-radius:10px;cursor:pointer;margin-bottom:6px;transition:all .15s;}
.adicional-opcao .adic-check{width:20px;height:20px;border-radius:6px;border:1.5px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;transition:all .15s;}
.btn-add-cart{width:100%;padding:14px;border-radius:14px;background:#E8001C;color:#fff;border:none;font-family:var(--font);font-size:15px;font-weight:800;cursor:pointer;transition:background .15s;}
.btn-add-cart:hover{background:#C0001A;}

/* FAB carrinho */
.fab-bar{position:fixed;bottom:68px;left:50%;transform:translateX(-50%);max-width:460px;width:calc(100% - 16px);background:var(--dark);border-radius:16px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 8px 32px rgba(0,0,0,.4);z-index:500;display:none;cursor:pointer;}
.fab-bar.show{display:flex;}

/* ══ CARRINHO / CHECKOUT ══ */
.cart-loja-header{padding:14px 18px 8px;border-top:1px solid var(--border);margin-top:4px;}
.cart-loja-nome{font-size:13px;font-weight:800;color:var(--dark);margin-bottom:2px;}
.cart-item{display:flex;align-items:center;gap:12px;padding:10px 18px;border-bottom:1px solid var(--border);}
.cart-item-nome{font-size:13px;font-weight:700;color:var(--dark);flex:1;}
.cart-item-adic{font-size:10px;color:var(--gray);line-height:1.5;}
.cart-item-preco{font-size:13px;font-weight:800;color:#E8001C;white-space:nowrap;}
.qty-ctrl{display:flex;align-items:center;gap:6px;}
.qty-ctrl button{width:26px;height:26px;border-radius:8px;background:var(--cream);border:none;font-size:1rem;font-weight:800;cursor:pointer;color:var(--dark);}
.checkout-section{padding:16px 18px;border-top:1px solid var(--border);}
.checkout-label{font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;}
.checkout-input{width:100%;padding:12px 14px;border-radius:12px;border:1.5px solid var(--accent2);background:#FFF5F5;font-family:var(--font);font-size:14px;color:var(--dark);outline:none;transition:border-color .2s;margin-bottom:8px;}
.checkout-input:focus{border-color:#E8001C;}
.pag-opt{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.pag-btn{padding:9px 16px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);font-family:var(--font);font-size:12px;font-weight:700;color:var(--mid);cursor:pointer;transition:all .15s;}
.pag-btn.ativo{background:#E8001C;border-color:#E8001C;color:#fff;}
.bandeira-btn-sm{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px;border-radius:9px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;font-family:var(--font);transition:all .15s;font-size:10px;font-weight:800;color:var(--mid);}
.bandeira-btn-sm.ativo{border-color:#E8001C;background:rgba(232,0,28,.05);color:#E8001C;}
.resumo-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--mid);padding:4px 0;}
.resumo-total{font-size:16px;font-weight:900;color:var(--dark);}
.btn-finalizar{width:100%;padding:16px;border-radius:14px;background:#E8001C;color:#fff;border:none;font-family:var(--font);font-size:15px;font-weight:800;cursor:pointer;margin-top:12px;}

/* ── MEUS PEDIDOS ── */
.pedido-card{background:#fff;border-radius:16px;padding:14px;margin-bottom:10px;border:1px solid var(--accent2);box-shadow:0 1px 8px rgba(232,0,28,.06);}
.pedido-status{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700;}

/* ── PERFIL MODAL ── */
.perfil-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:900;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px);}
.perfil-modal.open{display:flex;}
.perfil-sheet{background:var(--card);border-radius:22px 22px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease;}
.form-field{margin-bottom:12px;}
.form-label{display:block;font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px;}
.form-input{width:100%;padding:12px 14px;border-radius:12px;border:1.5px solid var(--border);background:var(--light);font-family:var(--font);font-size:14px;color:var(--dark);outline:none;transition:border-color .2s;}
.form-input:focus{border-color:var(--red);}
.form-input:disabled{opacity:.5;}
.form-input option{background:#fff;}
.btn-primary{width:100%;padding:14px;border-radius:14px;background:var(--red);color:#fff;border:none;font-family:var(--font);font-size:15px;font-weight:800;cursor:pointer;}
.btn-ghost{width:100%;padding:12px;border-radius:14px;background:transparent;color:var(--gray);border:1.5px solid var(--border);font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;}

/* LIGHTBOX */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:9999;align-items:center;justify-content:center;flex-direction:column;}
.lightbox.open{display:flex;}
.lightbox img{max-width:100%;max-height:88vh;object-fit:contain;border-radius:8px;}
.lightbox-close{position:absolute;top:16px;right:16px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* TOAST */
.toast{position:fixed;bottom:132px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--dark);color:#fff;padding:10px 20px;border-radius:50px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:8000;white-space:nowrap;pointer-events:none;max-width:calc(100% - 32px);text-align:center;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── CARROSSEL BANNER ── */
.promo-carousel{position:relative;overflow:hidden;}
.promo-slides{display:flex;transition:transform .45s cubic-bezier(.4,0,.2,1);}
.promo-slide{min-width:100%;padding:24px 20px 22px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden;}
.promo-slide::after{content:'';position:absolute;right:-20px;bottom:-20px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.06);}
.carousel-dots{display:flex;gap:5px;justify-content:center;margin-top:8px;}
.carousel-dot{height:4px;border-radius:2px;background:rgba(17,17,17,.18);transition:all .3s;cursor:pointer;}

/* ── Banner skeleton ── */
@keyframes sk-shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sk-pulse{background:linear-gradient(90deg,#2a1200 25%,#3d1e0a 50%,#2a1200 75%);background-size:200% 100%;animation:sk-shimmer 1.6s infinite;border-radius:8px;}
.banner-skeleton{margin:10px 18px 0;border-radius:18px;overflow:hidden;background:linear-gradient(135deg,#E8001C22,#C0001A15);border:1.5px solid rgba(232,0,28,.15);padding:22px 20px 20px;min-height:138px;display:flex;flex-direction:column;gap:12px;}
.banner-empty{margin:10px 18px 0;border-radius:18px;overflow:hidden;min-height:138px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:6px;position:relative;padding:24px 20px;background:linear-gradient(135deg,#E8001C 0%,#C0001A 40%,#A00015 100%);box-shadow:0 8px 32px rgba(232,0,28,.35);}

/* Empty */

.empty-icon{font-size:3rem;margin-bottom:12px;}
.empty-title{font-size:15px;font-weight:700;color:var(--dark);margin-bottom:6px;}
.empty-desc{font-size:13px;color:var(--gray);line-height:1.6;}



/* ANTI-ZOOM */
html,body{touch-action:manipulation !important;}
input,select,textarea{font-size:16px !important;touch-action:manipulation;}
*{-webkit-text-size-adjust:100%;}

<div id="splash-screen" style="
  position:fixed;inset:0;z-index:99999;

  display:flex;align-items:center;justify-content:center;
  transition:opacity .5s ease, transform .5s ease;
">

    id="splash-video"
    src="/splash.mp4"
    autoplay
    muted
    playsinline
    preload="auto"
    style="
      position:absolute;inset:0;
      width:100%;height:100%;
      object-fit:cover;
    "
  ></video>
</div>

<style>
#splash-screen.hide {
  opacity:0;
  transform:scale(1.04);
  pointer-events:none;
}
</style>

<script>
(function() {
  const splash = document.getElementById('splash-screen');
  const video  = document.getElementById('splash-video');

  function esconder() {
    splash.classList.add('hide');
    setTimeout(() => splash.remove(), 520);
  }

  // Esconde ao terminar o vídeo
  video.addEventListener('ended', esconder);

  // Fallback: esconde após 3.5s se o vídeo travar
  setTimeout(esconder, 3500);

  // Se não carregar (offline/erro), esconde imediatamente
  video.addEventListener('error', esconder);
})();
</script>

// ── Sanitização HTML — evita XSS com dados do banco ──────────────────────────
function esc(s){
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#x27;');
}

function podePedirAgora(){
  const agora=Date.now();
  while(_pedidosTimes.length&&agora-_pedidosTimes[0]>5*60*1000)_pedidosTimes.shift();
  if(_pedidosTimes.length>=3)return false;
  _pedidosTimes.push(agora);return true;
}

// ── Helper centralizado de status de abertura ───────────────────────────────
// Regra: toggle manual (aberto:true/false) sempre tem prioridade sobre horários
function calcularAberto(l) {
  if (l.aberto === false) return false;  // fechou manual → fechado
  if (l.aberto === true)  return true;   // abriu manual → aberto (ignora horário)
  // Sem toggle explícito → usa horários programados
  return !l.horarios || dentroDoHorario(l.horarios);
}

// Verifica se a loja está dentro do horário de funcionamento
function dentroDoHorario(horarios) {
  if (!horarios || typeof horarios !== 'object') return true; // sem horário = sempre aberto
  const agora = new Date();
  const diaSemana = agora.getDay(); // 0=Dom, 1=Seg... 6=Sab
  // Nosso índice: 0=Seg, 1=Ter, 2=Qua, 3=Qui, 4=Sex, 5=Sab, 6=Dom
  const mapa = [1,2,3,4,5,6,0]; // converte domingo-JS para nosso índice
  const idxDia = mapa.indexOf(diaSemana);
  const config = horarios[idxDia];
  if (!config || !config.ativo) return false; // dia marcado como fechado
  const [hAb, mAb] = (config.abertura || '00:00').split(':').map(Number);
  const [hFch, mFch] = (config.fechamento || '23:59').split(':').map(Number);
  const minAgora = agora.getHours() * 60 + agora.getMinutes();
  const minAb    = hAb  * 60 + mAb;
  const minFch   = hFch * 60 + mFch;
  if (minFch < minAb) {
    // Passa da meia-noite: ex 22:00 → 02:00
    return minAgora >= minAb || minAgora <= minFch;
  }
  return minAgora >= minAb && minAgora <= minFch;
}

// Texto do horário de hoje para exibir no app
function horarioHoje(horarios) {
  if (!horarios || typeof horarios !== 'object') return null;
  const agora = new Date();
  const diaSemana = agora.getDay();
  const mapa = [1,2,3,4,5,6,0];
  const idxDia = mapa.indexOf(diaSemana);
  const config = horarios[idxDia];
  if (!config || !config.ativo) return 'Fechado hoje';
  return config.abertura + ' às ' + config.fechamento;
}

// Formata número de telefone → (88) 98888-8888
function fmtFone(num) {
  if (!num) return '';
  const d = String(num).replace(/\D/g,'');
  if (d.length === 11) return '(' + d.slice(0,2) + ') ' + d.slice(2,7) + '-' + d.slice(7);
  if (d.length === 10) return '(' + d.slice(0,2) + ') ' + d.slice(2,6) + '-' + d.slice(6);
  if (d.length === 13) return '+' + d.slice(0,2) + ' (' + d.slice(2,4) + ') ' + d.slice(4,9) + '-' + d.slice(9);
  return d;
}
function wppLink(num, msg) {
  const d = String(num||'').replace(/\D/g,'');
  const n = d.length <= 11 ? '55' + d : d;
  const m = msg ? '?text=' + encodeURIComponent(msg) : '';
  return 'https://wa.me/' + n + m;
}

async function init() {

  }

  carregarEstados();

    const {data:pd} = await db.from('produtos')
      .select('id,nome,preco,preco_original,desconto_percent,estabelecimento_id,foto_url')
      .eq('em_promocao',true).gt('desconto_percent',0).eq('disponivel',true);

      preco_cheio:parseFloat(p.preco_original||p.preco||0),
    }));
  } catch(e){ _promoItems=[]; }

  // Carrega lojas
  const {data, error} = await db.from('estabelecimentos')
    .select('id,nome,slug,logo_url,cor_primaria,cidade,aberto,descricao,taxa_entrega,tempo_entrega,faz_entrega,faz_retirada,whatsapp,promocao_ativa,desconto_percent,tipo_estab,horarios,quente_dia,quente_nome')

    _lojas = (data||[]).map(l => ({
      ...l,
      _emoji:       lojaEmoji(l.nome),
      _bg:          l.cor_primaria||'#C0001A',
      _aberto:      calcularAberto(l), // usa helper centralizado
      _horarioHoje: horarioHoje(l.horarios),
    }));

    // Busca médias de avaliação
    try {
      const {data: avals} = await db.from('avaliacoes').select('estabelecimento_id,nota');
      if (avals?.length) {
        const medias = {};
        avals.forEach(a => {
          if (!medias[a.estabelecimento_id]) medias[a.estabelecimento_id] = [];
          medias[a.estabelecimento_id].push(a.nota);
        });
        _lojas = _lojas.map(l => ({
          ...l,
          _media: medias[l.id]?.length
            ? (medias[l.id].reduce((s,n)=>s+n,0)/medias[l.id].length).toFixed(1)
            : null,
          _totalAvals: medias[l.id]?.length || 0,
        }));
      }
    } catch(e) {}

    renderHome();
    renderBanner();
    renderSearchCats();
  }

  // Modal primeira visita
  if(!_user) setTimeout(() => abrirPerfil(true), 700);

  // Carrega pedidos salvos
  renderOrders();

  // Carrega status atuais antes de iniciar monitoramento
  await carregarStatusIniciais();
  _pollingId = setInterval(pollarPedidos, 3000);

  iniciarRealtime();
}

function showScreen(name) {
  if(name !== 'store' && name !== 'cart' && name !== 'orders') _prevScreen = _screen;
  _screen = name;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const scEl = $('screen-'+name);

  // nav
  ['home','search','cart','orders'].forEach(n => {
    $('nav-'+n)?.classList.toggle('active', n===name || (n==='home' && name==='promos'));
  });

  if(name==='orders') { renderOrders(); }

  atualizarFab(name);
}

function filtrarLojas() {
  const lojasComPromo = new Set(_promoItems.map(p=>p.estabelecimento_id));

  return _lojas.filter(l => {
    const lojaCidade = (l.cidade||'').trim().toLowerCase();
    const userCidade = (_cidade||'').trim().toLowerCase();
    const mc = !userCidade || lojaCidade === userCidade;
    const mb = !_busca  || (l.nome||'').toLowerCase().includes(_busca.toLowerCase());

    if(_catAtiva==='promo') {
      return mc && mb && (lojasComPromo.has(l.id) || l.promocao_ativa);
    }
    if(_catAtiva==='all') return mc && mb;

    // Mapa categoria → tipo_estab values
    const catMap = {
      burger:     ['burguer','burger'],
      pizza:      ['pizza'],
      acai:       ['acai'],
      restaurante:['restaurante'],
      lanche:     ['lanchonete'],
      japones:    ['japones'],
      churrasco:  ['churrasco'],
      saudavel:   ['saudavel'],
      sorvete:    ['sorvete'],
      doceria:    ['doceria'],
      bar:        ['bar'],
    };

    const tipos = catMap[_catAtiva] || [];
    const tipoLoja = (l.tipo_estab||'').toLowerCase();

    // Primeiro tenta tipo_estab (campo correto)
    if (tipoLoja && tipos.includes(tipoLoja)) return mc && mb;

    // Fallback: busca por nome (para lojas antigas sem tipo_estab)
    const n = (l.nome||'').toLowerCase();
    const nomeMap = {
      burger:['burger','hamburguer','smash','burguer'],
      pizza:['pizza','pizzaria'],
      acai:['açaí','acai'],
      restaurante:['restaurante','marmita'],
      lanche:['lanche','sanduíche','tapioca'],
    };
    return mc && mb && (nomeMap[_catAtiva]||[]).some(k=>n.includes(k));
  });
}

  10: { cor1:'#1A2E3D', cor2:'#0F1D2D', emoji:'🔵', food:'🍔', food2:'🍟' },
  15: { cor1:'#2E2A1A', cor2:'#1D1A0F', emoji:'🟡', food:'🌮', food2:'🧀' },
  20: { cor1:'#1A1A3D', cor2:'#0F0F2D', emoji:'💜', food:'🍕', food2:'🍷' },
  25: { cor1:'#3D1A1A', cor2:'#2D0F0F', emoji:'🔴', food:'🍣', food2:'🥢' },
  30: { cor1:'#111111', cor2:'#1A1A1A', emoji:'🔥', food:'🍔', food2:'🍟' },
  35: { cor1:'#3D2A0A', cor2:'#2D1A05', emoji:'🧡', food:'🌯', food2:'🥤' },
  40: { cor1:'#0F1A3D', cor2:'#0A0F2D', emoji:'⚡', food:'🍕', food2:'🧃' },
  45: { cor1:'#1A0A2D', cor2:'#0F0520', emoji:'✨', food:'🧁', food2:'🍰' },
  50: { cor1:'#2D0A0A', cor2:'#1A0505', emoji:'🎉', food:'🍔', food2:'🌮' },
};

async function renderBanner() {
  // _promoItems já carregado no init — só re-busca se estiver vazio
  if(!_promoItems.length) {
    try {
      const {data} = await db.from('produtos')
        .select('id,nome,preco,preco_original,desconto_percent,estabelecimento_id,foto_url')
        .eq('em_promocao',true).gt('desconto_percent',0).eq('disponivel',true);
      _promoItems = (data||[]).map(p=>({
        ...p, name:p.nome, desconto:parseInt(p.desconto_percent||0),
        preco_com_desc:parseFloat(p.preco||0), preco_cheio:parseFloat(p.preco_original||p.preco||0),
      }));
    } catch(e){ _promoItems=[]; }
  }

  // Agrupa por percentual
  const grupos = {};
  _promoItems.forEach(item => {
    const pct = item.desconto;
    if(!grupos[pct]) grupos[pct] = [];
    grupos[pct].push(item);
  });
  const percentuais = Object.keys(grupos).map(Number).sort((a,b)=>b-a);

  if(!percentuais.length) {
    $('banner-wrap').innerHTML = `
      <div class="banner-empty">
        <!-- Bokeh circles decorativos -->
        <div style="position:absolute;width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,.06);top:-30px;right:-20px;pointer-events:none"></div>
        <div style="position:absolute;width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,.05);bottom:-18px;left:10px;pointer-events:none"></div>
        <div style="position:absolute;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.07);bottom:10px;right:40px;pointer-events:none"></div>
        <!-- Hamburguer triste SVG -->
        <div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:8px">
          <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" style="filter:drop-shadow(0 4px 12px rgba(0,0,0,.35))">
            <!-- Pão de cima -->
            <ellipse cx="32" cy="18" rx="22" ry="12" fill="#D4860A"/>
            <ellipse cx="32" cy="14" rx="22" ry="10" fill="#F0A020"/>
            <ellipse cx="32" cy="13" rx="20" ry="8" fill="#F5B830"/>
            <!-- Gergelim -->
            <ellipse cx="24" cy="10" rx="2.5" ry="1.2" fill="#D4860A" transform="rotate(-15 24 10)"/>
            <ellipse cx="33" cy="8"  rx="2.5" ry="1.2" fill="#D4860A"/>
            <ellipse cx="41" cy="11" rx="2.5" ry="1.2" fill="#D4860A" transform="rotate(10 41 11)"/>
            <!-- Alface -->
            <path d="M10 30 Q18 26 26 30 Q34 26 42 30 Q50 26 54 30 L54 33 Q46 29 38 33 Q30 29 22 33 Q14 29 10 33Z" fill="#4CAF50"/>
            <!-- Queijo -->
            <rect x="11" y="30" width="42" height="5" rx="2" fill="#FFD166"/>
            <!-- Carne -->
            <ellipse cx="32" cy="36" rx="21" ry="6" fill="#8B3A00"/>
            <ellipse cx="32" cy="35" rx="20" ry="5" fill="#9E4500"/>
            <!-- Pão de baixo -->
            <ellipse cx="32" cy="48" rx="22" ry="7" fill="#D4860A"/>
            <ellipse cx="32" cy="47" rx="21" ry="6" fill="#E89820"/>
            <!-- Olhos tristes -->
            <circle cx="25" cy="20" r="2.2" fill="#5C2800"/>
            <circle cx="39" cy="20" r="2.2" fill="#5C2800"/>
            <!-- Brilho nos olhos -->
            <circle cx="26" cy="19" r=".7" fill="#fff" opacity=".7"/>
            <circle cx="40" cy="19" r=".7" fill="#fff" opacity=".7"/>
            <!-- Boca triste -->
            <path d="M26 25 Q32 22 38 25" stroke="#5C2800" stroke-width="1.8" stroke-linecap="round" fill="none"/>
            <!-- Lágrima -->
            <ellipse cx="23" cy="24" rx="1.2" ry="1.8" fill="#7dd3fc" opacity=".85"/>
          </svg>
          <div style="font-size:13px;font-weight:800;color:rgba(255,255,255,.85);letter-spacing:-.01em;">Nenhuma oferta hoje</div>
          <div style="font-size:11px;color:rgba(255,255,255,.45);line-height:1.55;text-align:center;max-width:180px">As promoções aparecem aqui quando os restaurantes ativarem 🤞</div>
        </div>
      </div>`;
    return;
  }

  // Um slide por percentual
  // Pega o nome criativo do dia de cada loja (quente_nome) — usa o mais comum
  const NOMES_CRIATIVOS = ['Domingo Delícia 🌞','Segundou com Sabor 🔥','Terça da Promo 🎯','Quartou com Gosto 🍔','Quintou Gostoso 🤤','Sextou QUENTE 🔥🔥','Sábado Irresistível 😋'];
  const nomeCriativo = (() => {
    // Busca nas lojas que têm quente_nome salvo
    const nomes = _lojas.filter(l=>l.quente_nome).map(l=>l.quente_nome);
    return nomes[0] || NOMES_CRIATIVOS[new Date().getDay()];
  })();

  _carouselSlides = percentuais.map(pct => ({ tipo:'grupo', pct, itens:grupos[pct], nomeCriativo }));
  _bannerIdx = 0;
  buildCarousel();
  iniciarTimer();
}

function buildCarousel() {
  const slides = _carouselSlides;
  if(!slides.length) return;

  const slidesHTML = slides.map((s, i) => {
    const pal = PALETAS[s.pct] || PALETAS[30];
    const item = s.itens[0];
    const loja = _lojas.find(l=>l.id===item.estabelecimento_id)||{};
    const mais = s.itens.length > 1 ? `+${s.itens.length-1} itens` : '';
    // Lojas únicas nesse slide
    const lojasUnicas = [...new Set(s.itens.map(i=>i.estabelecimento_id))]
      .map(id => _lojas.find(l=>l.id===id)).filter(Boolean);
    const qtdLojas = lojasUnicas.length;
    const qtdItens = s.itens.length;

    return `<div class="promo-slide"
      style="background:linear-gradient(135deg,${pal.cor1} 0%,${pal.cor2} 100%);cursor:pointer;overflow:hidden;position:relative;"
      onclick="abrirTelaPromos(${s.pct}, _promoItems.filter(p=>p.desconto===${s.pct}))">

      <!-- Emojis 3D flutuantes decorativos -->
      <div style="position:absolute;right:-10px;top:-14px;font-size:72px;opacity:.15;transform:rotate(15deg);pointer-events:none;line-height:1;">${pal.food}</div>
      <div style="position:absolute;right:42px;bottom:-16px;font-size:56px;opacity:.12;transform:rotate(-10deg);pointer-events:none;line-height:1;">${pal.food2}</div>

      <!-- Conteúdo -->
      <div style="position:relative;z-index:1;">
        <!-- Badge de quantidade + nome criativo do dia -->
        <div style="display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.1);border-radius:20px;padding:3px 10px;margin-bottom:8px;">
          <span style="font-size:9px;font-weight:700;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.08em;">${pal.emoji} ${qtdItens} ${qtdItens===1?'item':'itens'} · ${qtdLojas} ${qtdLojas===1?'loja':'lojas'}</span>
        </div>
        <div style="font-size:22px;font-weight:900;color:#fff;letter-spacing:-.02em;line-height:1.1;margin-bottom:6px;text-shadow:0 2px 12px rgba(0,0,0,.3);">${s.nomeCriativo||''}</div>

        <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:10px;">
          <!-- Percentual -->
          <div>
            <div style="display:flex;align-items:baseline;gap:3px;line-height:1;">
              <span style="font-size:46px;font-weight:900;color:#FFD166;">${s.pct}%</span>
              <span style="font-size:20px;font-weight:900;color:#fff;margin-bottom:4px;">OFF</span>
            </div>
          </div>
          <!-- Logos das lojas (até 3) -->
          <div style="display:flex;gap:-6px;">
            ${lojasUnicas.slice(0,3).map((l,li)=>`
              <div style="width:32px;height:32px;border-radius:50%;border:2px solid rgba(255,255,255,.3);overflow:hidden;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;margin-left:${li>0?'-8px':'0px'};z-index:${3-li};">
                ${l.logo_url?`<img src="${l.logo_url}" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none'">`:`<span style="font-size:13px;">${l._emoji||'🍽️'}</span>`}
              </div>`).join('')}
            ${qtdLojas>3?`<div style="width:32px;height:32px;border-radius:50%;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;margin-left:-8px;font-size:9px;font-weight:800;color:#fff;">+${qtdLojas-3}</div>`:''}
          </div>
        </div>

        <!-- Item destaque + CTA -->
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <div style="flex:1;min-width:0;">
            <div style="font-size:10px;color:rgba(255,255,255,.45);">${loja.nome}</div>
            <div style="font-size:13px;font-weight:800;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${item.name}</div>
            <div style="display:flex;align-items:center;gap:6px;margin-top:2px;">
              <span style="font-size:10px;color:rgba(255,255,255,.35);text-decoration:line-through;">R$ ${item.preco_cheio.toFixed(2).replace('.',',')}</span>
              <span style="font-size:13px;font-weight:900;color:#FFD166;">R$ ${item.preco_com_desc.toFixed(2).replace('.',',')}</span>
            </div>
          </div>
          <div style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);border-radius:10px;padding:6px 12px;font-size:11px;font-weight:700;color:#fff;white-space:nowrap;margin-left:10px;">Ver tudo →</div>
        </div>
      </div>
    </div>`;
  }).join('');

  const dotsHTML = slides.length>1 ? `<div class="carousel-dots" id="carousel-dots">
    ${slides.map((_,i)=>`<div class="carousel-dot" id="cdot-${i}" style="width:${i===0?'18':'6'}px;background:${i===0?'rgba(17,17,17,.5)':'rgba(17,17,17,.18)'};" onclick="irSlide(${i})"></div>`).join('')}
  </div>` : '';

  $('banner-wrap').innerHTML = `
    <div class="promo-carousel" id="promo-carousel">
      <div class="promo-slides" id="promo-slides" style="transform:translateX(0%);">${slidesHTML}</div>
    </div>
    ${dotsHTML}`;
}
function irSlide(idx) {
  clearTimeout(_bannerTimer);
  _bannerIdx = idx;
  const el = $('promo-slides');
  if(el) el.style.transform = `translateX(-${idx*100}%)`;
  atualizarDots(idx);
  iniciarTimer();
}

function atualizarDots(idx) {
  _carouselSlides.forEach((_,i) => {
    const d=$('cdot-'+i); if(!d) return;
    d.style.width   = i===idx ? '18px' : '6px';
    d.style.background = i===idx ? 'rgba(17,17,17,.5)' : 'rgba(17,17,17,.18)';
  });
}

function iniciarTimer() {
  clearTimeout(_bannerTimer);
  if(_carouselSlides.length<2) return;
  _bannerTimer = setTimeout(() => {
    _bannerIdx = (_bannerIdx+1) % _carouselSlides.length;
    irSlide(_bannerIdx);
  }, 3500);
}

let _searchDeb = null;
function onSearch(val) {
  _busca = val;
  $('search-clear').style.display = val ? 'block' : 'none';
  clearTimeout(_searchDeb);
  _searchDeb = setTimeout(() => {
    const res = _lojas.filter(l => !val || (l.nome||'').toLowerCase().includes(val.toLowerCase()));
    const el = $('search-results');
    if(!val) { el.innerHTML = ''; return; }
    el.innerHTML = res.length ? res.map(l => storeCardHTML(l)).join('') :
      '<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">Sem resultados</div></div>';
  }, 200);
}

function clearSearch() { $('search-input').value=''; _busca=''; $('search-clear').style.display='none'; $('search-results').innerHTML=''; }

function renderSearchCats() {
  $('search-cats').innerHTML = CATS.filter(c=>c.id!=='all').map(c =>
    `<div class="cat-pill" onclick="_catAtiva='${c.id}';showScreen('home')">${c.emoji} ${c.label}</div>`
  ).join('');
}

async function abrirLoja(id) {
  const loja = _lojas.find(l => l.id===id); if(!loja) return;
  _loja = loja;
  _produtos = [];
  _prodMap.clear();
  _tabAtiva = 'cardapio';

  // Capa da loja usa cor do banco; botões/UI sempre usa cor da plataforma #E8001C

  // Header — só nome, sem badge de promo
  $('store-header-nome').textContent = loja.nome;
  // Remove any leftover promo badge from nav
  const oldBadge = document.querySelector('.store-promo-nav-badge');
  if(oldBadge) oldBadge.remove();
  $('store-content').innerHTML = `<div style="padding:40px 20px;text-align:center;color:var(--gray);font-size:13px;">Carregando cardápio...</div>`;
  showScreen('store');
  atualizarCarrinhoBtns();

  // Carrega dados em paralelo
  const [prodRes, frRes] = await Promise.all([
    db.from('produtos').select('id,nome,preco,preco_original,desconto_percent,em_promocao,promocao,emoji,foto_url,categoria,disponivel,grupo_adicional_id,estabelecimento_id').eq('estabelecimento_id', loja.id).eq('disponivel', true).order('created_at',{ascending:false}),
    db.from('fresquinhos').select('id,titulo,descricao,midia_url,tipo,expires_at,estabelecimento_id').eq('estabelecimento_id', loja.id).gt('expires_at', new Date().toISOString()).order('created_at',{ascending:false})
  ]);

  _produtos = prodRes.data||[];
  const fresquinhos = frRes.data||[];

  // Carrega grupos de adicionais
  const gIds = [...new Set(_produtos.filter(p=>p.grupo_adicional_id).map(p=>p.grupo_adicional_id))];
  if(gIds.length) {
    try {
      const {data:grupos} = await db.from('grupos_adicionais').select('id,nome,opcoes,minimo,maximo,obrigatorio').in('id', gIds);
      const gMap = {}; (grupos||[]).forEach(g=>{ gMap[g.id]=g; });
      _produtos.forEach(p => { if(p.grupo_adicional_id) p.grupo_adicionais = gMap[p.grupo_adicional_id]||null; });
    } catch(e){}
  }

  _produtos.forEach(p => _prodMap.set(p.id, p));
  renderStore(fresquinhos);
}

function renderStore(fresquinhos=[]) {
  const l = _loja;
  const ab = l._aberto !== undefined ? l._aberto : calcularAberto(l);
  const cats = ['Todos', ...new Set(_produtos.map(p=>p.categoria).filter(Boolean))];
  const promos  = _produtos.filter(p=>p.promocao);                                    // PROMOÇÃO normal
  const quentes = _produtos.filter(p=>p.em_promocao && parseInt(p.desconto_percent||0)>0); // QUENTE
  const temPromo  = promos.length>0;
  const temQuente = quentes.length>0;
  const temFresq = fresquinhos.length>0;

  // Fresquinho HTML
  const fresqHTML = temFresq ? `
    <div class="fresquinho-wrap">
      <div style="font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px;padding:0 4px;">✨ Fresquinho</div>
      <div style="display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;padding:0 4px 4px;">
        ${fresquinhos.map(f => {
          const rest = new Date(f.expires_at)-new Date();
          const h=Math.floor(rest/3600000), mn=Math.floor((rest%3600000)/60000);
          return `<div class="story-thumb" onclick="abrirStory('${f.url}','${f.tipo||'foto'}','${f.id}')">
            ${f.tipo==='video'?`<video src="${f.url}" muted playsinline loop preload="metadata" style="width:100%;height:100%;object-fit:cover;background:#000;"></video>`:
            `<img src="${f.url}" alt="" style="width:100%;height:100%;object-fit:cover;">`}
            <div class="story-timer">⏱ ${h>0?h+'h ':''} ${mn}min</div>
          </div>`;
        }).join('')}
      </div>
    </div>` : '';

  // Filtros
  const filtrosHTML = `<div class="scroll-x" id="store-filtros">
    ${cats.map((c,i) => `<div class="filtro-pill${i===0?' ativo':''}" onclick="filtrarStore('${c}',this)">${c}</div>`).join('')}
  </div>`;

  $('store-content').innerHTML = `
    <!-- Capa igual ao cliente.html -->
    <div class="store-capa" style="background:${normalizeHex(l.cor_primaria||'#C0001A')};">
      <div class="loja-capa-header">
        <div class="loja-capa-logo">
          ${l.logo_url?`<img src="${l.logo_url}" alt="${l.nome}" onerror="this.style.display='none'">`:`${l._emoji}`}
        </div>
        <div style="flex:1;min-width:0;">
          <div class="loja-capa-nome">${l.nome}</div>
          ${l.descricao?`<div class="loja-capa-desc">${l.descricao.slice(0,60)}${l.descricao.length>60?'...':''}</div>`:''}
        </div>
        <div class="loja-capa-badge" style="align-self:flex-start;">
          <span style="width:7px;height:7px;border-radius:50%;background:${ab?'#22C55E':'#EF4444'};"></span>
          ${ab?'Aberto':'Fechado'}
        </div>
      </div>
      <div class="loja-capa-meta">
        ${l.tempo_entrega?`<span class="loja-capa-badge">⏱ ${l.tempo_entrega}</span>`:`<span class="loja-capa-badge">⏱ 25–40 min</span>`}
        ${l.taxa_entrega>0?`<span class="loja-capa-badge">🛵 ${fmt(l.taxa_entrega)}</span>`:`<span class="loja-capa-badge" style="color:#4ade80;">🛵 Entrega grátis</span>`}
        ${l._media?`<span class="loja-capa-badge" style="color:#fbbf24;font-weight:700;">⭐ ${l._media} <span style="opacity:.7;font-weight:400;">(${l._totalAvals} aval.)</span></span>`:''}
        ${l.cidade?`<span class="loja-capa-badge">📍 ${l.cidade}</span>`:''}
        ${l.whatsapp?`<a href="${wppLink(l.whatsapp)}" target="_blank" class="loja-capa-badge" style="text-decoration:none;color:#fff;">📞 Contato</a>`:''}
      </div>
    </div>

    <!-- Tabs -->
    <div class="store-tabs">
      <button class="store-tab active" id="tab-cardapio" onclick="storeTab('cardapio',this)">CARDÁPIO</button>
      <button class="store-tab" id="tab-quente" onclick="storeTab('quente',this)" style="gap:5px;">
        <span class="${temQuente?'fire-on':'fire-off'}">🔥</span>
        <span style="${temQuente?'color:#E8001C;font-weight:900':''}">QUENTE</span>
      </button>
      <!-- PROMOÇÃO tab removido -->
    </div>

    <!-- Fresquinho -->
    ${fresqHTML}

    <!-- Conteúdo da tab -->
    <div id="tab-content-cardapio" class="tab-content">
      ${filtrosHTML}
      <div id="store-produtos" style="display:flex;flex-direction:column;gap:10px;padding:10px 14px 120px;"></div>
    </div>
    <div id="tab-content-promo" class="tab-content" style="display:none;">
      <div id="store-promos" style="display:flex;flex-direction:column;gap:10px;padding:14px 14px 120px;"></div>
    </div>
    <div id="tab-content-quente" class="tab-content" style="display:none;">
      <!-- Pills de percentual -->
      <div style="padding:14px 14px 8px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none" id="quente-pct-pills"></div>
      <div id="store-quente" style="display:flex;flex-direction:column;gap:10px;padding:4px 14px 120px;"></div>
    </div>

  `;

  renderStoreProdutos('Todos');
  renderStorePromos();

  // Salva fresquinhos p/ story viewer
  window._storyFresq = fresquinhos;
}

function storeTab(tab, btn) {
  _tabAtiva = tab;
  document.querySelectorAll('.store-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(t=>t.style.display='none');
  $('tab-content-'+tab).style.display='';
  if(tab==='pedidos') renderStorePedidos();
  if(tab==='quente')  renderStoreQuente();
}

function filtrarStore(cat, btn) {
  document.querySelectorAll('#store-filtros .filtro-pill').forEach(b=>b.classList.remove('ativo'));
  btn.classList.add('ativo');
  renderStoreProdutos(cat);
}
window.filtrarStore = filtrarStore;

function renderStoreProdutos(cat) {
  const el = $('store-produtos'); if(!el) return;
  // Exclui produtos QUENTE do cardápio normal
  const base = _produtos.filter(p => !(p.em_promocao && parseInt(p.desconto_percent||0) > 0));
  const filtrados = cat==='Todos' ? base : base.filter(p=>p.categoria===cat);
  el.innerHTML = filtrados.length ? filtrados.map(p=>produtoCardHTML(p)).join('') :
    '<div class="empty-state"><div class="empty-icon">🍽️</div><div class="empty-title">Sem itens</div></div>';
}

function renderStorePromos() {
  const el = $('store-promos'); if(!el) return;
  const promos = _produtos.filter(p=>p.promocao||p.em_promocao);
  el.innerHTML = promos.length ? promos.map(p=>produtoCardHTML(p)).join('') :
    '<div class="empty-state"><div class="empty-icon">🔥</div><div class="empty-title">Sem promoções</div></div>';
}

function renderStoreQuente() {
  const el    = $('store-quente');    if(!el) return;
  const pills = $('quente-pct-pills'); if(!pills) return;

  // Produtos com desconto desta loja
  const promos = _produtos.filter(p => p.em_promocao && parseInt(p.desconto_percent||0) > 0);

  if(!promos.length) {
    pills.innerHTML = '';
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">🔥</div><div class="empty-title">Sem promoções ativas</div></div>';
    return;
  }

  // Percentuais disponíveis
  const pcts = [...new Set(promos.map(p=>parseInt(p.desconto_percent)))].sort((a,b)=>b-a);
  let pctAtivo = pcts[0];

  function renderPills() {
    pills.innerHTML = pcts.map(p=>`
      <button onclick="_queTabPct(${p})" id="qtp-${p}"
        style="padding:7px 16px;border-radius:100px;border:2px solid ${p===pctAtivo?'#E8001C':'rgba(255,255,255,.15)'};
               background:${p===pctAtivo?'#E8001C':'rgba(255,255,255,.06)'};
               color:${p===pctAtivo?'#fff':'rgba(255,255,255,.6)'};
               font-family:'Poppins',sans-serif;font-weight:800;font-size:.78rem;
               cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s">
        🔥 ${p}% OFF
      </button>`).join('');
  }

  function renderItens() {
    const filtrados = promos.filter(p=>parseInt(p.desconto_percent)===pctAtivo);
    el.innerHTML = filtrados.map(p=>produtoCardHTML(p)).join('');
  }

  window._queTabPct = function(pct) {
    pctAtivo = pct;
    renderPills();
    renderItens();
  };

  renderPills();
  renderItens();
}

function renderStorePedidos() {
  const el = $('store-pedidos'); if(!el) return;
  if(!_user) { el.innerHTML='<div class="empty-state"><div class="empty-icon">👤</div><div class="empty-title">Faça login para ver seus pedidos</div></div>'; return; }
  const slug = _loja?.slug;
  const peds = JSON.parse(localStorage.getItem('pw_peds_'+(slug||''))||'[]');
  if(!peds.length) { el.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">Nenhum pedido aqui ainda</div></div>'; return; }
  el.innerHTML = peds.slice(0,10).map(p => pedidoCardHTML(p)).join('');
}

function pedidoCardHTML(p) {
  const st = p.status||'novo';
  const isRetirada = (p.endereco||'').toLowerCase().includes('retirada');

  // Pedido recusado/cancelado
  if(st==='recusado'||st==='cancelado') return `<div class="pedido-card" data-pedido-id="${p.id}" style="border-left:3px solid #DC2626;opacity:.7;">
    <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
      <div>
        <div style="font-size:11px;color:var(--gray);">Pedido #${String(p.id||'').slice(-4).toUpperCase()}</div>
        ${p.lojaNome?`<div style="font-size:13px;font-weight:800;color:var(--dark);">${p.lojaNome}</div>`:''}
      </div>
      <span style="font-size:15px;font-weight:900;color:var(--dark);">${fmt(p.total)}</span>
    </div>
    <div style="font-size:11px;color:#DC2626;font-weight:700;margin-bottom:6px;">❌ Pedido recusado</div>
    <div style="font-size:12px;color:var(--gray);">${(p.itens||[]).map(i=>i.qtd+'x '+i.nome).join(' · ')}</div>
  </div>`;

  // 3 etapas — alinhadas com o dashboard:
  // novo → preparo → pronto
  const ETAPAS = [
    { ids:['novo'],    label:'Aguardando', cor:'#F59E0B' },
    { ids:['preparo'], label:'Preparando', cor:'#E8001C' },
    { ids:['pronto'],  label: isRetirada?'Pronto':'Entregue', cor:'#16A34A' },
  ];

  const etapaAtual = ETAPAS.findIndex(e => e.ids.includes(st));
  const idx = etapaAtual < 0 ? 0 : etapaAtual;
  const corAtual = ETAPAS[idx].cor;

  const STATUS_LABEL = {
    novo:    { icon:'⏳', txt:'Aguardando confirmação' },
    preparo: { icon:'🍳', txt:'Confirmado — em preparo' },
    pronto:  { icon: isRetirada?'🏃':'✅', txt: isRetirada?'Pronto para retirar':'Pronto! Pedido entregue' },
  };
  const sl = STATUS_LABEL[st] || STATUS_LABEL.novo;

  const barras = ETAPAS.map((e,i)=>{
    const done  = i < etapaAtual;
    const atual = i === etapaAtual;
    const bg    = done ? '#16A34A' : atual ? corAtual : 'rgba(17,17,17,.1)';
    return `<div style="flex:1;display:flex;flex-direction:column;gap:5px;align-items:center;">
      <div style="width:100%;height:5px;border-radius:3px;background:${bg};transition:background .4s;"></div>
      <div style="font-size:9px;font-weight:${atual?'800':'500'};color:${done?'#16A34A':atual?corAtual:'rgba(17,17,17,.2)'};">${e.label}</div>
    </div>`;
  }).join('');

  const itensStr = (p.itens||[]).map(i=>i.qtd+'x '+i.nome).join(' · ');
  const itensHtml = p.itens && p.itens.length > 0 ? `
    <div style="font-size:12px;color:var(--gray);margin-bottom:8px;">${itensStr}</div>
    ${p.itens.length > 0 ? `<details style="font-size:11px;color:var(--gray);">
      <summary style="cursor:pointer;color:#E8001C;font-weight:600;list-style:none;display:flex;align-items:center;gap:4px;">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        Ver detalhes
      </summary>
      <div style="margin-top:8px;padding:8px;background:var(--accent,#FFF0F0);border-radius:10px;">
        ${(p.itens||[]).map(i=>`<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(232,0,28,.1);">
          <span>${i.qtd}x ${i.nome}</span>
          <span style="font-weight:700;">${fmt(i.preco*i.qtd)}</span>
        </div>`).join('')}
        <div style="display:flex;justify-content:space-between;padding:6px 0 0;font-weight:800;">
          <span>Total</span><span style="color:#E8001C;">${fmt(p.total)}</span>
        </div>
      </div>
    </details>` : ''}
  ` : `<div style="font-size:12px;color:var(--gray);">${itensStr}</div>`;

  return `<div class="pedido-card" data-pedido-id="${p.id}" style="border-left:3px solid ${corAtual};">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2px;">
      <div>
        <div style="font-size:11px;font-weight:600;color:var(--gray);">Pedido #${String(p.id||'').slice(-4).toUpperCase()}</div>
        ${p.lojaNome?`<div style="font-size:13px;font-weight:800;color:var(--dark);">${p.lojaNome}</div>`:''}
      </div>
      <span style="font-size:15px;font-weight:900;color:var(--dark);">${fmt(p.total)}</span>
    </div>
    <div style="display:flex;gap:6px;margin:12px 0 6px;">${barras}</div>
    <div style="font-size:11px;font-weight:700;color:${corAtual};margin-bottom:8px;">${sl.icon} ${sl.txt}</div>
    ${itensHtml}
  </div>`;
}

function produtoCardHTML(p) {
  const temPromo = (p.promocao || p.em_promocao) && parseInt(p.desconto_percent||0) > 0;
  const pct = parseInt(p.desconto_percent||0);

  return `<div class="produto-card" onclick="abrirProduto('${p.id}')">
    <div class="produto-img-wrap" style="position:relative;">
      ${p.foto_url
        ? `<img src="${p.foto_url}" alt="${p.nome}" loading="lazy" style="width:100%;height:100%;object-fit:cover;display:block;">`
        : `<div class="produto-emoji-bg">${p.emoji||'🍔'}</div>`}
      ${temPromo ? `<div style="position:absolute;top:0;left:0;z-index:3;">
        <div style="
          background:#E8001C;
          color:#fff;
          font-size:9px;
          font-weight:900;
          letter-spacing:.03em;
          padding:4px 9px 4px 7px;
          border-radius:0 0 10px 0;
          display:flex;align-items:center;gap:3px;
          box-shadow:2px 2px 6px rgba(0,0,0,.2);
          line-height:1;
        ">🔥 ${pct}% OFF</div>
      </div>` : ''}
    </div>
    <div class="produto-body">
      <div>
        <div class="produto-cat">${p.categoria||''}</div>
        <div class="produto-nome">${p.nome}</div>
        <div class="produto-desc">${(p.descricao||'').slice(0,80)}${(p.descricao||'').length>80?'...':''}</div>
      </div>
      <div class="produto-footer">
        <div>
          ${temPromo && p.preco_original ? `<div class="produto-preco-orig">${fmt(p.preco_original)}</div>` : ''}
          <div class="produto-preco">${fmt(p.preco)}</div>
        </div>
        <button class="btn-mais" onclick="event.stopPropagation();adicionarDireto('${p.id}')">+</button>
      </div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════
// MODAL PRODUTO
// ═══════════════════════════════════════════════════════
window.abrirProduto = function(id) {
  const p = _prodMap.get(id); if(!p) return;
  _prodAtual = p; _qtdAtual = 1;
  $('modal-qtd').textContent = 1;
  // Fotos
  const fotos = (p.fotos_urls&&p.fotos_urls.length)?p.fotos_urls:(p.foto_url?[p.foto_url]:[]);
  const media = $('modal-prod-media');
  if(fotos.length) {
    let fi=0;
    const dots=()=>fotos.map((_,i)=>`<div style="width:7px;height:7px;border-radius:50%;background:${i===fi?'#fff':'rgba(255,255,255,0.4)'};transition:background 0.2s"></div>`).join('');
    const renderF=()=>{ media.innerHTML=`<div style="position:relative;background:#000"><img class="modal-img" src="${fotos[fi]}" style="width:100%;display:block;max-height:260px;object-fit:cover;cursor:zoom-in;" onclick="abrirLightbox('${fotos[fi]}')">${fotos.length>1?`<button onclick="_mfoto(-1)" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.55);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:1.3rem;cursor:pointer;z-index:5;">‹</button><button onclick="_mfoto(1)" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.55);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:1.3rem;cursor:pointer;z-index:5;">›</button><div id="mdots" style="position:absolute;bottom:10px;left:0;right:0;display:flex;justify-content:center;gap:5px">${dots()}</div>`:''}</div>`; };
    window._mfoto=dir=>{fi=(fi+dir+fotos.length)%fotos.length;const img=media.querySelector('img');if(img)img.src=fotos[fi];const d=$('mdots');if(d)d.innerHTML=dots();};
    renderF();
  } else {
    media.innerHTML=`<div class="modal-emoji">${p.emoji||'🍔'}</div>`;
  }
  $('modal-cat').textContent  = p.categoria||'';
  $('modal-nome').textContent = p.nome;
  $('modal-desc').textContent = p.descricao||'';
  $('modal-preco').textContent= fmt(p.preco);
  // Adicionais
  renderAdicionaisModal(p);
  $('modal-prod').classList.add('open');
  document.body.style.overflow='hidden';
};

function renderAdicionaisModal(p) {
  const el = $('modal-adicionais'); if(!el) return;
  const g = p.grupo_adicionais;
  if(!g || !g.opcoes) { el.innerHTML=''; return; }
  const opcoes = Array.isArray(g.opcoes)?g.opcoes:JSON.parse(g.opcoes||'[]');
  const min = parseInt(g.minimo||g.min||0), max = parseInt(g.maximo||g.max||opcoes.length);
  el.innerHTML = `<div class="adicional-grupo">
    <div class="adicional-titulo">${g.grupo||g.nome||'Adicionais'}</div>
    <div class="adicional-sub">${min>0?'Obrigatório: ':'Opcional: '}escolha até ${max}</div>
    <div id="aviso-adic" style="display:none;font-size:11px;color:#E8001C;margin-bottom:6px;">Máximo de ${max} itens atingido</div>
    ${opcoes.map((o,i)=>`<label class="adicional-opcao" id="adic-lbl-${i}" onclick="toggleAdic(${i},${max})">
      <div>
        <div style="font-size:13px;font-weight:600;color:var(--dark);">${o.nome}</div>
        ${o.preco>0?`<div style="font-size:12px;color:var(--gray);">+ ${fmt(o.preco)}</div>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="checkbox" id="adic-cb-${i}" data-preco="${o.preco||0}" data-nome="${o.nome}" style="display:none;">
        <div class="adic-check" id="adic-chk-${i}">　</div>
      </div>
    </label>`).join('')}
  </div>`;
}

window.toggleAdic = function(i, max) {
  const cb=$('adic-cb-'+i), lbl=$('adic-lbl-'+i), chk=$('adic-chk-'+i);
  if(!cb) return;
  if(!cb.checked) {
    const total=document.querySelectorAll('[id^="adic-cb-"]:checked').length;
    if(total>=max){$('aviso-adic').style.display='block';setTimeout(()=>$('aviso-adic').style.display='none',2000);return;}
    cb.checked=true;lbl.style.borderColor='#E8001C';lbl.style.background='rgba(232,0,28,.05)';
    chk.style.background='#E8001C';chk.style.borderColor='#E8001C';chk.style.color='#fff';chk.textContent='✓';
  } else {
    cb.checked=false;lbl.style.borderColor='#e0dbd5';lbl.style.background='';
    chk.style.background='';chk.style.borderColor='#ddd';chk.style.color='';chk.textContent='　';
  }
};

window.mudaQtd = function(d) { _qtdAtual=Math.max(1,_qtdAtual+d); $('modal-qtd').textContent=_qtdAtual; };

window.fecharModal = function() { $('modal-prod').classList.remove('open'); _prodAtual=null; document.body.style.overflow=''; };
window.abrirLightbox = function(src) { const lb=$('lightbox'); const img=$('lightbox-img'); if(!lb||!img||!src) return; img.src=src; lb.classList.add('open'); };
window.fecharLightbox = function() { $('lightbox')?.classList.remove('open'); };

window.adicionarAoCarrinho = function() {
  if(!_prodAtual) return;
  const adics = [];
  document.querySelectorAll('[id^="adic-cb-"]:checked').forEach(cb => {
    adics.push({nome:cb.dataset.nome, preco:parseFloat(cb.dataset.preco||0)});
  });
  const extra = adics.reduce((s,a)=>s+a.preco,0);
  const item = {..._prodAtual, preco:_prodAtual.preco+extra, adicionais:adics};
  adicionarItem(item, _qtdAtual);
  fecharModal();
  toast('Adicionado! 🛒');
};

window.adicionarDireto = function(id) {
  const p = _prodMap.get(id); if(!p) return;
  if(p.grupo_adicionais) { abrirProduto(id); return; }
  adicionarItem(p, 1);
  toast(p.nome+' adicionado! 🛒');
};

// ═══════════════════════════════════════════════════════
// CARRINHO MULTI-LOJA
// ═══════════════════════════════════════════════════════
function adicionarItem(p, qtd) {
  const eid = _loja.id;
  if(!_carrinhos[eid]) _carrinhos[eid] = {loja:_loja, itens:[]};
  const c = _carrinhos[eid];
  if(p.adicionais&&p.adicionais.length) {
    c.itens.push({...p, qtd});
  } else {
    const idx = c.itens.findIndex(i=>i.id===p.id&&(!i.adicionais||!i.adicionais.length));
    if(idx>=0) c.itens[idx].qtd+=qtd;
    else c.itens.push({...p, qtd});
  }
  atualizarFab();
  atualizarCartBtn();
  atualizarCarrinhoBtns();
}

function cartTotal() {
  let t=0;
  Object.values(_carrinhos).forEach(c => c.itens.forEach(i=>t+=i.preco*i.qtd));
  return t;
}

function cartCount() {
  let n=0;
  Object.values(_carrinhos).forEach(c => c.itens.forEach(i=>n+=i.qtd));
  return n;
}

function atualizarFab(screen) {
  const sc = screen||_screen;
  const n=cartCount(), fab=$('fab-bar');
  if(!fab) return;
  if(n>0 && sc!=='cart') {
    fab.classList.add('show');
    $('fab-cnt').textContent=n;
    $('fab-total').textContent=fmt(cartTotal());
  } else {
    fab.classList.remove('show');
  }
  // Nav badge
  const nb=$('nav-cart-badge');
  if(nb){nb.textContent=n>0?n:'';nb.style.display=n>0?'flex':'none';}
}

function atualizarCartBtn() {
  const n=cartCount();
  const hb=$('home-cart-btn'), hc=$('home-cart-cnt');
  if(hb) hb.style.display=n>0?'flex':'none';
  if(hc) hc.textContent=n;
}

function atualizarCarrinhoBtns() {
  const eid=_loja?.id;
  const n = eid&&_carrinhos[eid] ? _carrinhos[eid].itens.reduce((s,i)=>s+i.qtd,0) : 0;
  const scb=$('store-cart-cnt');
  if(scb){scb.textContent=n>0?n:'';scb.style.display=n>0?'inline-flex':'none';}
}

// ═══════════════════════════════════════════════════════
// CARRINHO SCREEN — checkout em etapas
// ═══════════════════════════════════════════════════════
// Etapas: 1=Sacola, 2=Entrega, 3=Pagamento, 4=Confirmação
let _checkoutStep = {}; // { [lid]: 1|2|3|4 }
let _checkoutData = {}; // { [lid]: { opcaoEntrega, rua, num, compl, nome, tel, obs, pag } }

function getStep(lid) { return _checkoutStep[lid] || 1; }
function setStep(lid, step) { _checkoutStep[lid] = step; renderCarrinho(); }

window.nextStep = function(lid) { setStep(lid, getStep(lid)+1); };
window.prevStep = function(lid) { setStep(lid, getStep(lid)-1); };
window.goStep   = function(lid, s) { setStep(lid, s); };

function saveStepData(lid) {
  const d = _checkoutData[lid] || {};
  _checkoutData[lid] = {
    ...d,
    opcaoEntrega: d.opcaoEntrega||'entrega',
    rua:   $('rua-'+lid)?.value||d.rua||'',
    num:   $('num-'+lid)?.value||d.num||'',
    compl: $('compl-'+lid)?.value||d.compl||'',
    nome:  $('cli-nome-'+lid)?.value||d.nome||_user?.nome||'',
    tel:   $('cli-tel-'+lid)?.value||d.tel||_user?.tel||'',
    obs:   $('cli-obs-'+lid)?.value||d.obs||'',
    pag:   d.pag||'pix',
  };
}

function renderCarrinho() {
  const el=$('cart-content'); if(!el) return;
  const lojas=Object.values(_carrinhos).filter(c=>c.itens.length>0);
  const sub=$('cart-subtitle');
  if(!lojas.length){
    if(sub) sub.textContent='';
    el.innerHTML=`<div class="empty-state" style="padding:80px 20px;">
      <div style="font-size:64px;margin-bottom:16px;filter:grayscale(.3);">🛒</div>
      <div style="font-size:17px;font-weight:800;color:var(--dark);margin-bottom:8px;">Sacola vazia</div>
      <div style="font-size:13px;color:var(--gray);line-height:1.6;margin-bottom:24px;">Escolha um restaurante e adicione itens para começar seu pedido</div>
      <button onclick="showScreen('home')" style="padding:13px 28px;border-radius:12px;background:var(--red);color:#fff;border:none;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;">Explorar restaurantes →</button>
    </div>`;
    return;
  }
  const totalItens = lojas.reduce((s,c)=>s+c.itens.reduce((ss,i)=>ss+i.qtd,0),0);
  const totalGeral = lojas.reduce((s,c)=>s+c.itens.reduce((ss,i)=>ss+i.preco*i.qtd,0)+parseFloat(c.loja.taxa_entrega||0),0);
  if(sub) sub.textContent = `${totalItens} ${totalItens===1?'item':'itens'} · ${fmt(totalGeral)}`;
  el.innerHTML = lojas.map(c => renderCheckoutLoja(c)).join('');
}

function renderCheckoutLoja(c) {
  const l = c.loja;
  const lid = l.id;
  const step = getStep(lid);
  const d = _checkoutData[lid] || {};

  const sub = c.itens.reduce((s,i)=>s+i.preco*i.qtd, 0);
  const taxa = parseFloat(l.taxa_entrega||0);
  const total = sub + (d.opcaoEntrega==='retirada' ? 0 : taxa);

  // Step indicator
  const steps = ['Itens','Entrega','Pagamento'];
  const stepBar = `<div style="display:flex;align-items:center;gap:0;margin-bottom:18px;">
    ${steps.map((s,i)=>{
      const n=i+1, done=step>n, active=step===n;
      return `
      <div style="display:flex;align-items:center;flex:1;">
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;">
          <div style="width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;cursor:${done?'pointer':'default'};
            background:${done?'#22C55E':active?'#E8001C':'rgba(17,17,17,.08)'};
            color:${done||active?'#fff':'var(--gray)'};
            transition:all .2s;" ${done?`onclick="goStep('${lid}',${n})"`:''}>
            ${done?'✓':n}
          </div>
          <div style="font-size:10px;font-weight:${active?'700':'500'};color:${active?'#E8001C':'var(--gray)'};">${s}</div>
        </div>

window.setOpcaoEnt = function(lid, op) {
  if(!_checkoutData[lid]) _checkoutData[lid]={};
  _checkoutData[lid].opcaoEntrega=op;
  document.querySelectorAll(`[id^="btn-ent-${lid}"], [id^="btn-ret-${lid}"]`).forEach(b=>b.classList.remove('ativo'));
  $('btn-'+(op==='entrega'?'ent':'ret')+'-'+lid)?.classList.add('ativo');
  const campos=$('campos-ent-'+lid);
  if(campos) campos.style.display=op==='entrega'?'':'none';
};

window.setPagStep = function(lid, pag) {
  if(!_checkoutData[lid]) _checkoutData[lid]={};
  _checkoutData[lid].pag=pag;
  ['pix','cartao','dinheiro'].forEach(p=>{
    const b=$('p'+p+'-'+lid); if(b) b.classList.toggle('ativo',p===pag);
  });
  const tw=$('troco-wrap-'+lid);  if(tw)  tw.style.display  = pag==='dinheiro' ? '' : 'none';
  const cw=$('cartao-wrap-'+lid); if(cw)  cw.style.display  = pag==='cartao'   ? '' : 'none';
};

window.setTipoCartao = function(lid, tipo) {
  if(!_checkoutData[lid]) _checkoutData[lid]={};
  _checkoutData[lid].tipoCartao = tipo;
  const bc=$('pcred-'+lid); if(bc) bc.classList.toggle('ativo', tipo==='credito');
  const bd=$('pdeb-'+lid);  if(bd) bd.classList.toggle('ativo', tipo==='debito');
};

window.setBandeira = function(lid, band) {
  if(!_checkoutData[lid]) _checkoutData[lid]={};
  _checkoutData[lid].bandeira = band;
  const wrap = $('bandeiras-'+lid);
  if(wrap) wrap.querySelectorAll('.bandeira-btn-sm').forEach(b => {
    b.classList.toggle('ativo', b.getAttribute('onclick')?.includes("'"+band+"'"));
  });
};

window.validarEntrega = function(lid) {
  saveStepData(lid);
  const d=_checkoutData[lid]||{};
  const op=d.opcaoEntrega||'entrega';
  if(!d.nome||!d.nome.trim()) return toast('Digite seu nome');
  if(!d.tel||d.tel.replace(/\D/g,'').length<10) return toast('WhatsApp inválido');
  if(op==='entrega') {
    if(!d.rua||!d.rua.trim()) return toast('Digite a rua');
    if(!d.num||!d.num.trim()) return toast('Digite o número');
  }
  nextStep(lid);
};

window.mudaCartItem = function(lid, ii, d) {
  const c=_carrinhos[lid]; if(!c) return;
  c.itens[ii].qtd = Math.max(0, c.itens[ii].qtd+d);
  if(c.itens[ii].qtd===0) c.itens.splice(ii,1);
  if(!c.itens.length) delete _carrinhos[lid];
  // Reset step se esvaziou
  if(!_carrinhos[lid]) { delete _checkoutStep[lid]; delete _checkoutData[lid]; }
  renderCarrinho();
  atualizarFab('cart');
  atualizarCartBtn();
};

// FINALIZAR PEDIDO
// ═══════════════════════════════════════════════════════
window.finalizarPedido = async function(lid) {
  saveStepData(lid);
  const c=_carrinhos[lid]; if(!c||!c.itens.length) return toast('Sacola vazia');
  const l=c.loja;
  if(!calcularAberto(l)) return toast(l.horarios?'🕐 Fora do horário de atendimento':'Loja fechada no momento');
  const d=_checkoutData[lid]||{};
  const nome  = d.nome?.trim();
  const whats = (d.tel||'').replace(/\D/g,'');
  const obs   = d.obs?.trim()||'';
  const op    = d.opcaoEntrega||'entrega';
  const rua   = d.rua?.trim()||'';
  const num   = d.num?.trim()||'';
  const compl = d.compl?.trim()||'';

  if(!nome) return toast('Digite seu nome');
  if(!whats||whats.length<10) return toast('WhatsApp inválido');
  if(op==='entrega') {
    if(!rua) return toast('Digite a rua');
    if(!num) return toast('Digite o número');
  }

  // ── Validações de tamanho ────────────────────────────────────────────────
  if(nome.length>100)  return toast('Nome muito longo');
  if(whats.length>15)  return toast('WhatsApp inválido');
  if(rua.length>200)   return toast('Endereço muito longo');
  if(obs.length>500)   return toast('Observação muito longa (máx 500 caracteres)');

  // ── Rate limiting — máx 3 pedidos em 5 minutos ───────────────────────────
  if(!podePedirAgora()) return toast('Muitos pedidos em pouco tempo. Aguarde alguns minutos.');

  const endereco = op==='entrega' ? [rua, num?'Nº '+num:'', compl].filter(Boolean).join(', ').slice(0,300) : 'Retirada no local';

  // ── Total sempre recalculado — nunca aceita preço do carrinho sem validar ─
  const itens = c.itens.map(i=>({
    id:    i.id,
    nome:  String(i.nome||'').slice(0,120),
    preco: Number(i.preco)||0,
    qtd:   Math.max(1,Math.min(99,Number(i.qtd)||1)),
    emoji: String(i.emoji||'').slice(0,10),
    adicionais:(i.adicionais||[]).map(a=>({
      nome:  String(a.nome||'').slice(0,80),
      preco: Number(a.preco)||0,
    })),
  }));
  const sub = itens.reduce((s,i)=>s+i.preco*i.qtd+(i.adicionais||[]).reduce((sa,a)=>sa+a.preco*i.qtd,0),0);
  const taxa = op==='retirada' ? 0 : parseFloat(l.taxa_entrega||0);
  const total = Math.round((sub+taxa)*100)/100;

  const btn=document.querySelector(`[onclick="finalizarPedido('${lid}')"]`);
  if(btn){btn.disabled=true;btn.textContent='Enviando...';}

  try {
    // INSERT retornando o ID direto
    const {data:insertData, error} = await db.from('pedidos').insert({
      estabelecimento_id: lid,
      cliente_nome: nome,
      cliente_whats: whats,
      observacao: obs,
      itens, total,
      status: 'novo',
      endereco,
      pagamento: d.pag==='cartao'
        ? `cartao-${d.tipoCartao||'credito'}-${d.bandeira||'visa'}`
        : (d.pag||'pix'),
      taxa_entrega: taxa,
    }).select('id').single();
    if(error) throw new Error('Erro ao registrar pedido. Tente novamente.');

    const pedId = insertData?.id || ('local_'+Date.now());



    // Adiciona na lista local com ID real do banco
    _pedidosLocais.unshift({
      id: pedId,
      itens, total, status: 'novo',
      endereco,
      lojaNome: l.nome,
      lojaId: lid,
      cliente_whats: whats,
      created_at: new Date().toISOString(),
    });
    _statusAnt[pedId] = 'novo';

    // Salva dados do cliente
    if(!_user) _user = {};
    _user.tel = $('cli-tel-'+lid)?.value || _user.tel || '';
    _user.nome = nome;
    _user._lastWhats = whats; // whats sempre disponível
    localStorage.setItem('pw_cliente', JSON.stringify(_user));
    localStorage.setItem('pw_last_whats', whats);

    delete _carrinhos[lid];
    delete _checkoutStep[lid];
    delete _checkoutData[lid];
    atualizarFab('cart');
    atualizarCartBtn();
    renderCarrinho();

    // Mostra pedidos imediatamente
    showScreen('orders');
    renderOrders();
    toast('Pedido enviado! Aguardando confirmação ✅');

  } catch(e) {
    toast('Erro: '+(e.message||'Tente novamente'));
  } finally {
    if(btn){btn.disabled=false;btn.textContent='Mandar o pedido! 🚀';}
  }
};
