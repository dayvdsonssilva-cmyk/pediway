async function renderOrders() {
  const el=$('orders-content'); if(!el) return;

  // Sempre busca do banco — mostra local apenas se não houver whats ainda
  // Não limpa tela se já tiver conteúdo — evita clarão
  const temConteudo = el.children.length > 0 && !el.innerHTML.includes('Atualizando');
  if(!temConteudo) {
    if(_pedidosLocais.length) {
      el.innerHTML = `<div style="font-size:16px;font-weight:800;color:var(--dark);margin-bottom:14px;padding:0 2px;">Meus pedidos</div>` +
        _pedidosLocais.map(p => pedidoCardHTML(p)).join('');
    } else {
      el.innerHTML=`<div style="padding:20px;text-align:center;font-size:13px;color:var(--gray);">Atualizando...</div>`;
    }
  }

  // Pega whats de todas as fontes
  let whats = (_user?.tel||'').replace(/\D/g,'')
    || (_user?._lastWhats||'').replace(/\D/g,'')
    || (localStorage.getItem('pw_last_whats')||'').replace(/\D/g,'');

  if(!whats || whats.length<10) {
    el.innerHTML=`<div class="empty-state" style="padding:80px 20px;">
      <div style="font-size:56px;margin-bottom:14px;">📋</div>
      <div style="font-size:16px;font-weight:800;color:var(--dark);margin-bottom:8px;">Nenhum pedido ainda</div>
      <div style="font-size:13px;color:var(--gray);line-height:1.6;margin-bottom:22px;">Faça seu primeiro pedido!</div>
      <button onclick="showScreen('home')" style="padding:12px 24px;border-radius:12px;background:var(--red);color:#fff;border:none;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;">Ver restaurantes →</button>
    </div>`;
    return;
  }

  try {
    const {data} = await db.from('pedidos')
      .select('id,status,total,itens,endereco,estabelecimento_id,created_at,pagamento')
      .eq('cliente_whats', whats)
      .order('created_at', {ascending:false})
      .limit(40);

    if(data && data.length>0) {
      // Atualiza status local
      data.forEach(p => { _statusAnt[p.id] = p.status; });

      // Atualiza _statusAnt com dados frescos do banco
      data.forEach(p => { _statusAnt[p.id] = p.status; });

      const allPeds = data.map(p => {
        const loja = _lojas.find(l=>l.id===p.estabelecimento_id)||{};
        return {...p, lojaNome:loja.nome||'Loja'};
      });

function pedirPermissaoNotificacao() {
  if(!('Notification' in window)) return;
  if(Notification.permission === 'default') {
    // Pede com delay para não assustar o usuário na abertura
    setTimeout(() => {
      Notification.requestPermission();
    }, 3000);
  }
}

function notificarNativo(titulo, corpo, icon) {
  if(!('Notification' in window) || Notification.permission !== 'granted') return;
  try {
    const n = new Notification(titulo, {
      body:  corpo,
      icon:  icon || '/favicon.ico',
      badge: '/favicon.ico',
      tag:   'pediuai-pedido', // substitui notif anterior do mesmo tipo
      renotify: true,
    });
    n.onclick = () => { window.focus(); n.close(); showScreen('orders'); };
    setTimeout(() => n.close(), 8000);
  } catch(e) {}
}

function notificarStatus(nomeLoja, status, isRetirada) {
  const msgs = {
    preparo:  { titulo:`🍳 ${nomeLoja}`, corpo:'Seu pedido foi confirmado e está sendo preparado!' },
    aceito:   { titulo:`🍳 ${nomeLoja}`, corpo:'Seu pedido foi confirmado e está sendo preparado!' },
    pronto:   {
      titulo:`${isRetirada?'🏃':'🛵'} ${nomeLoja}`,
      corpo: isRetirada ? 'Seu pedido está pronto para retirada!' : 'Seu pedido saiu para entrega!'
    },
    entregue: { titulo:`🎉 ${nomeLoja}`, corpo:'Pedido entregue! Bom apetite 😋' },
    cancelado:{ titulo:`❌ ${nomeLoja}`, corpo:'Seu pedido foi cancelado.' },
    recusado: { titulo:`❌ ${nomeLoja}`, corpo:'Seu pedido foi recusado.' },
  };
  const m = msgs[status];
  if(!m) return;
  notificarNativo(m.titulo, m.corpo);
  toast(`${m.titulo}: ${m.corpo}`);
}

async function pollarPedidos() {
  // Pega whats de qualquer fonte disponível
  const whats = ((_user?.tel||'').replace(/\D/g,''))
    || ((_user?._lastWhats||'').replace(/\D/g,''))
    || ((localStorage.getItem('pw_last_whats')||'').replace(/\D/g,''))
    || ((_pedidosLocais[0]?.cliente_whats||'').replace(/\D/g,''));
  if(!whats||whats.length<10) return;

  try {
    const {data} = await db.from('pedidos')
      .select('id,status,estabelecimento_id')
      .eq('cliente_whats', whats)
      .order('created_at',{ascending:false})
      .limit(40);

    if(!data) return;

    let temMudanca = false;
    data.forEach(p => {
      const ant = _statusAnt[p.id];
      // Notifica mudança de status
      if(ant !== undefined && ant !== p.status) {
        temMudanca = true;
        const loja = _lojas.find(l=>l.id===p.estabelecimento_id);
        const local = _pedidosLocais.find(pl=>pl.id===p.id);
        const isRet = (local?.endereco||'').toLowerCase().includes('retirada');
        notificarStatus(loja?.nome||'Loja', p.status, isRet);
        // Abre avaliação quando pedido fica pronto/entregue
        if(p.status === 'pronto' && !localStorage.getItem('pw_aval_' + p.id)) {
          setTimeout(() => abrirModalAvaliacao(p.id, p.estabelecimento_id, loja?.nome||'Loja'), 2000);
        }
      }
      _statusAnt[p.id] = p.status;
      // Atualiza _pedidosLocais
      const li = _pedidosLocais.findIndex(pl=>pl.id===p.id);
      if(li>=0) _pedidosLocais[li].status = p.status;
    });

    // SEMPRE atualiza a tela de pedidos — não espera mudança
    if(_screen==='orders') renderOrders();

    // Verifica pedidos prontos não avaliados — apenas dos últimos 7 dias
    const seteDiasAtras = new Date(Date.now() - 7*24*60*60*1000).toISOString();
    data.forEach(p => {
      const criado = _pedidosLocais.find(pl=>pl.id===p.id)?.created_at || '';
      // Ignora pedidos mais antigos que 7 dias
      if (criado && criado < seteDiasAtras) return;
      if(p.status === 'pronto'
        && !localStorage.getItem('pw_aval_' + p.id)
        && !_avaliacoesMostradas.has(p.id)) {
        _avaliacoesMostradas.add(p.id);
        const loja = _lojas.find(l=>l.id===p.estabelecimento_id);
        setTimeout(() => abrirModalAvaliacao(p.id, p.estabelecimento_id, loja?.nome||'Loja'), 1500);
      }
    });

  } catch(e){ console.warn('poll err:', e); }
}

function atualizarStatusLocal(pedidoId, novoStatus, estabId) {
  const loja = _lojas.find(l=>l.id===estabId);
  if(!loja?.slug) return;
  const key = 'pw_peds_'+loja.slug;
  const peds = JSON.parse(localStorage.getItem(key)||'[]');
  const idx = peds.findIndex(p=>p.id===pedidoId);
  if(idx>=0) { peds[idx].status=novoStatus; localStorage.setItem(key,JSON.stringify(peds)); }
}

// Supabase Realtime para updates instantâneos
function iniciarRealtime() {
  const whats = ((_user?.tel||'').replace(/\D/g,''))
    || ((_user?._lastWhats||'').replace(/\D/g,''))
    || ((localStorage.getItem('pw_last_whats')||'').replace(/\D/g,''));
  if(!whats||whats.length<10) return;
  try {
    db.channel('pediuai-cliente-'+whats.slice(-4))
      .on('postgres_changes', {
        event: 'UPDATE',
        schema: 'public',
        table: 'pedidos',
      }, payload => {
        if((payload.new?.cliente_whats||'').replace(/\D/g,'') !== whats) return;
        const p = payload.new;
        const ant = _statusAnt[p.id];
        if(ant !== undefined && ant !== p.status) {
          const loja = _lojas.find(l=>l.id===p.estabelecimento_id);
          const nomeLoja = loja?.nome||'Loja';
          const msgs = {
            aceito:   `🍳 ${nomeLoja}: Pedido em preparo!`,
            pronto:   `🎉 ${nomeLoja}: Pedido pronto!`,
            entregue: `✅ ${nomeLoja}: Pedido entregue!`,
            cancelado:`❌ ${nomeLoja}: Pedido cancelado.`,
          };
          if(msgs[p.status]) toast(msgs[p.status]);
          atualizarStatusLocal(p.id, p.status, p.estabelecimento_id);
        }
        _statusAnt[p.id] = p.status;
        const li = _pedidosLocais.findIndex(pl=>pl.id===p.id);
        if(li>=0) _pedidosLocais[li].status = p.status;
        if(_screen==='orders') renderOrders();
      })
      .subscribe();
  } catch(e) { console.warn('Realtime pedidos:', e); }

  // ── Realtime: cor e status dos estabelecimentos ─────────────────────────────
  // Quando o dono muda a cor no painel, atualiza o fundo do cardápio em tempo real
  try {
    db.channel('pw-lojas-cor')
      .on('postgres_changes', {
        event: 'UPDATE',
        schema: 'public',
        table: 'estabelecimentos',
        filter: undefined,   // escuta todas as lojas
      }, payload => {
        const novo = payload.new;
        if (!novo?.id) return;

        // Atualiza a loja em memória
        const idx = _lojas.findIndex(l => l.id === novo.id);
        if (idx >= 0) {
          _lojas[idx] = {
            ..._lojas[idx],
            cor_primaria:  novo.cor_primaria  || _lojas[idx].cor_primaria,
            aberto:        novo.aberto        !== undefined ? novo.aberto : _lojas[idx].aberto,
            nome:          novo.nome          || _lojas[idx].nome,
            descricao:     novo.descricao     ?? _lojas[idx].descricao,
            logo_url:      novo.logo_url      ?? _lojas[idx].logo_url,
            tempo_entrega: novo.tempo_entrega || _lojas[idx].tempo_entrega,
            taxa_entrega:  novo.taxa_entrega  ?? _lojas[idx].taxa_entrega,
            _bg:           novo.cor_primaria  || _lojas[idx]._bg,
          };

          // Se o cliente está vendo o cardápio dessa loja → atualiza o fundo imediatamente
          if (_lojaAtual?.id === novo.id && novo.cor_primaria) {
            const hex = normalizeHex(novo.cor_primaria);
            _lojaAtual = { ..._lojaAtual, cor_primaria: hex, _bg: hex };
            // Atualiza a capa do cardápio (wallpaper) sem recarregar a tela
            const capaEl = document.querySelector('.store-capa');
            if (capaEl) capaEl.style.background = hex;
          }

          // Redenriza a lista de lojas se estiver na home ou busca
          if (_screen === 'home' || _screen === 'search') renderHome();
        }
      })
      .subscribe();
  } catch(e) { console.warn('Realtime lojas:', e); }
}

const STORY_DUR = 5000;
window.abrirStory = function(url, tipo, id) {
  const fresq = window._storyFresq||[];
  _stories = fresq.map(f=>({url:f.url,tipo:f.tipo||'foto'}));
  if(!_stories.length) _stories=[{url,tipo}];
  _storyIdx = _stories.findIndex(s=>s.url===url); if(_storyIdx<0) _storyIdx=0;
  $('story-viewer').classList.add('open');
  $('story-loja-nome').textContent = _loja?.nome||'';
  renderStory();
};
function renderStory(){
  clearTimeout(_storyTimer);
  const s=_stories[_storyIdx]; if(!s){fecharStory();return;}
  const bg=$('story-bg'),vid=$('story-vid-el');
  if(s.tipo==='video'){if(bg){bg.style.backgroundImage='none';bg.style.display='none';}if(vid){vid.style.display='block';vid.src=s.url;vid.load();vid.play().catch(()=>{});}}
  else{if(vid){vid.pause();vid.src='';vid.style.display='none';}if(bg){bg.style.display='block';bg.style.backgroundImage=`url("${s.url}")`;}}
  const bars=$('story-bars');
  bars.innerHTML=_stories.map((_,i)=>`<div class="story-bar-bg"><div class="story-bar-fill" id="sbar-${i}"></div></div>`).join('');
  for(let i=0;i<_storyIdx;i++){const b=$('sbar-'+i);if(b)b.style.width='100%';}
  const ba=$('sbar-'+_storyIdx);
  if(ba){ba.style.transition='none';ba.style.width='0%';requestAnimationFrame(()=>requestAnimationFrame(()=>{ba.style.transition=`width ${STORY_DUR}ms linear`;ba.style.width='100%';}));}
  if(s.tipo==='video'){const v=$('story-vid-el');if(v){const oe=()=>{v.removeEventListener('ended',oe);storyProximo();};v.addEventListener('ended',oe);_storyTimer=setTimeout(()=>storyProximo(),31000);}else{_storyTimer=setTimeout(()=>storyProximo(),STORY_DUR);}}
  else{_storyTimer=setTimeout(()=>storyProximo(),STORY_DUR);}
}
function storyTap(e){const x=e.clientX,w=window.innerWidth;if(x<w/3)storyAnterior();else if(x>w*2/3)storyProximo();}
window.storyProximo=function(){if(_storyIdx<_stories.length-1){_storyIdx++;renderStory();}else fecharStory();};
window.storyAnterior=function(){if(_storyIdx>0){_storyIdx--;renderStory();}};
window.fecharStory=function(){clearTimeout(_storyTimer);$('story-viewer').classList.remove('open');const v=$('story-vid-el');if(v){v.pause();v.src='';}};

function normalizeHex(cor) {
  if(!cor) return '#C0001A';
  if(cor.startsWith('#')) return cor;
  const m=cor.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
  return m?'#'+[m[1],m[2],m[3]].map(n=>(+n).toString(16).padStart(2,'0')).join(''):'#C0001A';
}

function darken(hex,amt) {
  const m=hex.replace('#','').match(/.{2}/g);
  if(!m||m.length<3) return hex;
  return '#'+m.map(h=>Math.max(0,parseInt(h,16)-amt).toString(16).padStart(2,'0')).join('');
}

function lojaEmoji(nome) {
  const n=(nome||'').toLowerCase();
  if(n.includes('pizza')||n.includes('pizz')) return '🍕';
  if(n.includes('burger')||n.includes('hamburguer')||n.includes('burguer')) return '🍔';
  if(n.includes('açaí')||n.includes('acai')) return '🍧';
  if(n.includes('sushi')||n.includes('japonês')) return '🍣';
  if(n.includes('doce')||n.includes('confeit')||n.includes('bolo')) return '🍰';
  if(n.includes('lanche')) return '🥪';
  if(n.includes('churrasco')||n.includes('carne')) return '🥩';
  return '🍽️';
}

function mskTel(inp) {
  let v=(inp.value||'').replace(/\D/g,'').slice(0,11);
  if(v.length>10) v=v.replace(/^(\d{2})(\d{5})(\d{4})$/,'($1) $2-$3');
  else if(v.length>6) v=v.replace(/^(\d{2})(\d{4})(\d*)$/,'($1) $2-$3');
  else if(v.length>2) v=v.replace(/^(\d{2})(\d*)$/,'($1) $2');
  else if(v.length>0) v='('+v;
  inp.value=v;
}
window.mskTel=mskTel;

let _toastTimer=null;
function toast(msg) {
  const el=$('app-toast'); if(!el) return;
  el.textContent=msg; el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>el.classList.remove('show'),3000);
}

// ═══════════════════════════════════════════════════════
// BLOQUEIO DE ZOOM (pinch Safari, touchmove 2 dedos, double-tap)
// ═══════════════════════════════════════════════════════
(function(){
  // Pinch Safari iOS (gesturestart/change/end)
  document.addEventListener('gesturestart',  function(e){ e.preventDefault(); }, { passive: false });
  document.addEventListener('gesturechange', function(e){ e.preventDefault(); }, { passive: false });
  document.addEventListener('gestureend',    function(e){ e.preventDefault(); }, { passive: false });

  // Pinch universal via touchmove com 2+ dedos
  document.addEventListener('touchmove', function(e){
    if(e.touches.length > 1) e.preventDefault();
  }, { passive: false });

  // Double-tap zoom
  var _lastTap = 0;
  document.addEventListener('touchend', function(e){
    var now = Date.now();
    if(now - _lastTap < 300) e.preventDefault();
    _lastTap = now;
  }, { passive: false });
})();

// ═══════════════════════════════════════════════════════
// START
// ═══════════════════════════════════════════════════════
init();

// ── PWA: Registro do Service Worker ──────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => {
        console.log('[PWA] Service Worker registrado:', reg.scope);
        setInterval(() => reg.update(), 30 * 60 * 1000);
      })
      .catch(err => console.warn('[PWA] Falha ao registrar SW:', err));
  });
}

// ── PWA: Banner "Instalar app" no Android ────────────────────────────────────
let _installPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _installPrompt = e;
  const jaInstalou = localStorage.getItem('pw_pwa_instalado');
  if (!jaInstalou) {
    setTimeout(() => {
      const b = document.getElementById('pwa-install-banner');
      if (b) { b.style.transform = 'translateY(0)'; b.style.opacity = '1'; }
    }, 3000);
  }
});

window.pwaBtnInstalar = async function() {
  if (!_installPrompt) return;
  _installPrompt.prompt();
  const { outcome } = await _installPrompt.userChoice;
  if (outcome === 'accepted') {
    localStorage.setItem('pw_pwa_instalado', '1');
    toast('✅ PEDIWAY instalado no seu celular!');
  }
  const b = document.getElementById('pwa-install-banner');
  if (b) b.style.transform = 'translateY(120%)';
  _installPrompt = null;
};

window.pwaBtnDismiss = function() {
  const b = document.getElementById('pwa-install-banner');
  if (b) b.style.transform = 'translateY(120%)';
  localStorage.setItem('pw_pwa_instalado', '1');
};

window.addEventListener('appinstalled', () => {
  const b = document.getElementById('pwa-install-banner');
  if (b) b.style.transform = 'translateY(120%)';
  localStorage.setItem('pw_pwa_instalado', '1');
});

// Lazy-load com fade-in para imagens dos produtos
document.addEventListener('DOMContentLoaded',()=>{
  document.body.addEventListener('load',function(e){
    if(e.target.tagName==='IMG'&&e.target.closest('.produto-img-wrap')){
      e.target.classList.add('loaded');
    }
  },true);
});
</script>
