<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>PEDIWAY — Sem conexão</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',system-ui,sans-serif;background:#080808;color:#fff;height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;}
.logo{font-size:2rem;font-weight:900;letter-spacing:-.04em;margin-bottom:6px;}
.logo b{color:#C0001A;}
h2{font-size:1.1rem;font-weight:700;color:#fff;margin-bottom:8px;}
p{font-size:.85rem;color:#666;line-height:1.6;margin-bottom:24px;}
button{background:#C0001A;color:#fff;border:none;border-radius:12px;padding:14px 28px;font-size:.9rem;font-weight:800;cursor:pointer;}
.dot{width:10px;height:10px;border-radius:50%;background:#ef4444;margin:0 auto 16px;animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
</style>
</head>
<body>
<div>
  <div class="logo">PEDI<b>WAY</b></div>
  <div class="dot"></div>
  <h2>Sem conexão com a internet</h2>
  <p>O dashboard precisa de internet para funcionar em tempo real.<br>Verifique sua conexão e tente novamente.</p>
  <button onclick="location.reload()">↻ Tentar novamente</button>
</div>
</body>
</html>
